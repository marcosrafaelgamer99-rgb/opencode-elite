<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenCode — Elite AI Coding Assistant</title>
  <meta name="description" content="Multi-agent AI coding assistant powered by HuggingFace. Elite code generation, review, and architecture." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Tokens ─────────────────────────────────────────────────── */
    :root {
      --void:       #000000;
      --s1:         #080808;
      --s2:         #0f0f0f;
      --s3:         #141414;
      --border:     #1c1c1c;
      --gold:       #C9A84C;
      --gold-l:     #E8C96A;
      --gold-d:     rgba(201,168,76,0.15);
      --emerald:    #00C896;
      --em-d:       rgba(0,200,150,0.12);
      --cyan:       #00B8D9;
      --crimson:    #E05252;
      --violet:     #A78BFA;
      --t1:         #F2F2F2;
      --t2:         #888;
      --t3:         #3a3a3a;
      --ui:         'Inter', system-ui, sans-serif;
      --mono:       'JetBrains Mono', monospace;
      --r-sm:       5px;
      --r-md:       10px;
      --r-lg:       14px;
    }

    /* ─── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--void);
      color: var(--t1);
      font-family: var(--ui);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── App Shell ───────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: 100vh;
      height: 100vh;
    }

    /* ─── Sidebar ─────────────────────────────────────────────────── */
    #sidebar {
      background: var(--s1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      width: 28px; height: 28px;
      border: 1.5px solid var(--gold);
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark::before {
      content: '';
      width: 9px; height: 9px;
      background: var(--gold);
      border-radius: 2px;
      box-shadow: 0 0 8px var(--gold);
    }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.06em;
    }
    .logo-text span { color: var(--gold); }

    .sidebar-section {
      padding: 14px 0 4px;
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--t3);
      padding: 0 16px 8px;
    }

    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 10px 4px;
      padding: 8px 10px;
      border-radius: var(--r-md);
      border: 1px solid rgba(201,168,76,0.3);
      background: var(--gold-d);
      color: var(--gold);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 150ms ease;
      font-family: var(--ui);
      width: calc(100% - 20px);
    }
    .new-chat-btn:hover {
      background: rgba(201,168,76,0.22);
      border-color: var(--gold);
    }

    .chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      font-size: 12.5px;
      color: var(--t2);
      cursor: pointer;
      border-radius: 0;
      transition: background 120ms ease, color 120ms ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item:hover { background: var(--s2); color: var(--t1); }
    .history-item.active { color: var(--gold); background: rgba(201,168,76,0.06); }
    .history-item .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* Model selector */
    .model-section {
      border-top: 1px solid var(--border);
      padding: 12px;
    }

    .model-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 8px;
    }

    #model-select {
      width: 100%;
      background: var(--s3);
      border: 1px solid var(--border);
      color: var(--t1);
      padding: 7px 10px;
      border-radius: var(--r-sm);
      font-size: 12px;
      font-family: var(--mono);
      cursor: pointer;
      outline: none;
      transition: border-color 150ms;
    }
    #model-select:focus { border-color: var(--gold); }

    .mode-toggle {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .mode-btn {
      flex: 1;
      padding: 6px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--t2);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 150ms;
      font-family: var(--ui);
    }
    .mode-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-d);
    }

    /* Status dot */
    .hf-status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px 12px;
      font-size: 11px;
      color: var(--t2);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--t3);
      transition: background 300ms, box-shadow 300ms;
    }
    .status-dot.online { background: var(--emerald); box-shadow: 0 0 6px var(--emerald); animation: pulse-dot 2s ease infinite; }
    .status-dot.error  { background: var(--crimson); }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ─── Main Chat Area ──────────────────────────────────────────── */
    #main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Top bar */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--t2);
    }

    /* Agent pipeline indicator */
    #pipeline {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-family: var(--mono);
    }

    .pipeline-node {
      padding: 3px 9px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--t3);
      transition: all 200ms ease;
      letter-spacing: 0.03em;
    }
    .pipeline-node.active  { border-color: var(--gold); color: var(--gold); animation: node-pulse 1.2s ease infinite; }
    .pipeline-node.done    { border-color: var(--emerald); color: var(--emerald); animation: none; }
    .pipeline-node.waiting { border-color: var(--border); color: var(--t3); }
    @keyframes node-pulse { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 8px var(--gold)} }
    .pipeline-arrow { color: var(--t3); }

    /* ─── Messages ────────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Empty state */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }

    .empty-logo {
      width: 56px; height: 56px;
      border: 1.5px solid rgba(201,168,76,0.4);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .empty-logo::before {
      content: '';
      width: 20px; height: 20px;
      background: var(--gold);
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(201,168,76,0.5);
    }

    .empty-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--t1);
    }
    .empty-title span { color: var(--gold); }

    .empty-sub {
      font-size: 13.5px;
      color: var(--t2);
      max-width: 380px;
      line-height: 1.7;
    }

    .suggestion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
      width: 100%;
      max-width: 520px;
    }

    .suggestion {
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--s1);
      font-size: 12.5px;
      color: var(--t2);
      cursor: pointer;
      text-align: left;
      transition: all 150ms ease;
      line-height: 1.5;
    }
    .suggestion:hover { border-color: var(--gold); color: var(--t1); background: rgba(201,168,76,0.04); }
    .suggestion strong { display: block; color: var(--t1); font-size: 12px; margin-bottom: 2px; }

    /* Message rows */
    .msg-row {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-bottom: 1px solid transparent;
      animation: msg-appear 0.25s ease forwards;
    }
    @keyframes msg-appear { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    .msg-row.user { background: transparent; }
    .msg-row.assistant { background: rgba(255,255,255,0.015); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    .msg-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }
    .msg-avatar.user-av  { background: var(--s3); border: 1px solid var(--border); }
    .msg-avatar.ai-av    { background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.3); }

    .msg-name {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .msg-name.user-name { color: var(--t2); }
    .msg-name.ai-name   { color: var(--gold); }

    .msg-body {
      padding-left: 38px;
      font-size: 14.5px;
      line-height: 1.75;
      color: var(--t1);
    }

    /* User message text */
    .user-text { color: var(--t1); }

    /* Agent section headers inside assistant messages */
    .agent-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 18px 0 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: var(--mono);
    }
    .agent-header.analyst  { color: var(--cyan); }
    .agent-header.coder    { color: var(--emerald); }
    .agent-header.auditor  { color: var(--violet); }
    .agent-header:first-child { margin-top: 0; }

    .agent-line {
      flex: 1;
      height: 1px;
      background: currentColor;
      opacity: 0.2;
    }

    /* Code blocks */
    .msg-body pre {
      background: var(--s3);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
      position: relative;
    }

    .msg-body pre code {
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      color: var(--emerald);
    }

    .code-lang-badge {
      position: absolute;
      top: 8px; right: 10px;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .copy-btn {
      position: absolute;
      top: 6px; right: 36px;
      padding: 2px 8px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--s1);
      color: var(--t2);
      font-size: 10px;
      cursor: pointer;
      font-family: var(--ui);
      opacity: 0;
      transition: opacity 150ms, color 150ms;
    }
    pre:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--gold); border-color: var(--gold); }

    /* Inline code */
    .msg-body code:not(pre code) {
      font-family: var(--mono);
      font-size: 12.5px;
      color: var(--emerald);
      background: var(--s3);
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    /* Analyzing status bar */
    #analyzing-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 24px 10px 62px;
      font-size: 12.5px;
      font-family: var(--mono);
      color: var(--gold);
      animation: analyzing-in 0.2s ease;
    }
    @keyframes analyzing-in { from{opacity:0} to{opacity:1} }
    #analyzing-bar.visible { display: flex; }

    .analyzing-spinner {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(201,168,76,0.3);
      border-top-color: var(--gold);
      animation: spin-gold 0.6s linear infinite;
    }
    @keyframes spin-gold { to{transform:rotate(360deg)} }

    .analyzing-text {
      animation: shimmer 1.8s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.55} }

    /* Streaming cursor */
    .cursor {
      display: inline-block;
      width: 7px; height: 15px;
      background: var(--emerald);
      vertical-align: middle;
      border-radius: 1px;
      animation: blink 0.75s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ─── Input Area ──────────────────────────────────────────────── */
    #input-area {
      border-top: 1px solid var(--border);
      background: var(--void);
      padding: 16px 24px 20px;
      flex-shrink: 0;
    }

    #input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 12px 14px;
      transition: border-color 200ms, box-shadow 200ms;
    }
    #input-wrap:focus-within {
      border-color: rgba(201,168,76,0.5);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.06);
    }

    #prompt-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--t1);
      font-family: var(--mono);
      font-size: 13.5px;
      line-height: 1.6;
      resize: none;
      min-height: 22px;
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    #prompt-input::placeholder { color: var(--t3); }

    #send-btn {
      width: 36px; height: 36px;
      border-radius: var(--r-md);
      background: var(--gold);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--void);
      font-size: 16px;
      transition: background 150ms, box-shadow 150ms, transform 120ms;
    }
    #send-btn:hover { background: var(--gold-l); box-shadow: 0 0 14px rgba(201,168,76,0.4); transform: scale(1.04); }
    #send-btn:active { transform: scale(0.96); }
    #send-btn:disabled { background: var(--s3); cursor: not-allowed; transform: none; box-shadow: none; }

    .input-footer {
      display: flex;
      justify-content: center;
      padding-top: 10px;
      font-size: 11px;
      color: var(--t3);
    }

    /* ─── Scrollbar ────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ─── Syntax Highlight ─────────────────────────────────────── */
    .kw  { color: #C792EA; }
    .str { color: #C3E88D; }
    .num { color: #F78C6C; }
    .cmt { color: #546e7a; font-style: italic; }
    .fn  { color: var(--cyan); }
    .tp  { color: #FFCB6B; }
    .op  { color: var(--gold-l); }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Sidebar ──────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark"></div>
      <div class="logo-text">Open<span>Code</span></div>
    </div>

    <div class="sidebar-section">
      <button class="new-chat-btn" onclick="newChat()" id="new-chat-btn">
        <span>＋</span> New conversation
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">History</div>
      <div class="chat-history" id="chat-history">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- Model selection -->
    <div class="model-section">
      <div class="model-label">Model</div>
      <select id="model-select">
        <option value="Qwen/Qwen2.5-Coder-7B-Instruct">Qwen2.5-Coder 7B (Free)</option>
        <option value="Qwen/Qwen2.5-Coder-32B-Instruct">Qwen2.5-Coder 32B (PRO)</option>
        <option value="Qwen/Qwen2.5-Coder-1.5B-Instruct">Qwen2.5-Coder 1.5B (Fast)</option>
        <option value="deepseek-ai/deepseek-coder-6.7b-instruct">DeepSeek-Coder 6.7B</option>
        <option value="bigcode/starcoder2-15b">StarCoder2 15B</option>
      </select>

      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-fast" onclick="setMode('fast')">⚡ Fast</button>
        <button class="mode-btn" id="mode-deep" onclick="setMode('deep')">🔬 Deep</button>
      </div>
    </div>

    <div class="hf-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connecting...</span>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────────── -->
  <main id="main">

    <!-- Top bar with pipeline indicator -->
    <div id="topbar">
      <span class="topbar-title" id="chat-title">New conversation</span>
      <div id="pipeline">
        <span class="pipeline-node waiting" id="pn-analyst" data-label="Analyst">Analyst</span>
        <span class="pipeline-arrow">→</span>
        <span class="pipeline-node waiting" id="pn-coder" data-label="Coder">Coder</span>
        <span class="pipeline-arrow">→</span>
        <span class="pipeline-node waiting" id="pn-auditor" data-label="Auditor">Auditor</span>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages">
      <div id="empty-state">
        <div class="empty-logo"></div>
        <h1 class="empty-title">Open<span>Code</span></h1>
        <p class="empty-sub">Elite multi-agent AI for high-level code. Powered by HuggingFace.</p>
        <div class="suggestion-grid">
          <button class="suggestion" onclick="useSuggestion(this)">
            <strong>TypeScript Class</strong>
            Build a type-safe EventEmitter with generics
          </button>
          <button class="suggestion" onclick="useSuggestion(this)">
            <strong>REST API</strong>
            Create a Node.js Express API with auth middleware
          </button>
          <button class="suggestion" onclick="useSuggestion(this)">
            <strong>Algorithm</strong>
            Implement a LRU Cache with O(1) get and put
          </button>
          <button class="suggestion" onclick="useSuggestion(this)">
            <strong>Review Code</strong>
            Audit this code for bugs and security issues
          </button>
        </div>
      </div>
    </div>

    <!-- Analyzing bar (gold status) -->
    <div id="analyzing-bar">
      <div class="analyzing-spinner"></div>
      <span class="analyzing-text" id="analyzing-text">Analyzing Architecture...</span>
    </div>

    <!-- Input -->
    <div id="input-area">
      <div id="input-wrap">
        <textarea
          id="prompt-input"
          placeholder="Ask OpenCode anything about code..."
          rows="1"
          autocomplete="off"
          spellcheck="false"
        ></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">↑</button>
      </div>
      <div class="input-footer">
        OpenCode · HuggingFace Inference API · Multi-Agent Pipeline
      </div>
    </div>

  </main>
</div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────
let ws = null;
let currentMode = 'fast';
let isStreaming = false;
let conversationHistory = [];
let chatSessions = [];
let currentSessionId = null;
let currentAgentBlock = null;
let currentAgentName = null;
let analyzingPhase = null;

const pipelineNodes = {
  analyst:  document.getElementById('pn-analyst'),
  coder:    document.getElementById('pn-coder'),
  auditor:  document.getElementById('pn-auditor'),
};

// ─── HTTP Stream / Vercel API ────────────────────────────────────────────────

async function sendMessage() {
  const input = document.getElementById('prompt-input');
  const prompt = input.value.trim();
  if (!prompt || isStreaming) return;

  // Hide empty state
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  // Append user message
  const userRow = document.createElement('div');
  userRow.className = 'msg-row user';
  userRow.innerHTML = `
    <div class="msg-header">
      <div class="msg-avatar user-av">@</div>
      <span class="msg-name user-name">You</span>
    </div>
    <div class="msg-body user-text">${escapeHtml(prompt)}</div>
  `;
  appendMessage(userRow);

  conversationHistory.push({ role: 'user', content: prompt });

  // Start streaming state
  isStreaming = true;
  currentAgentBlock = null;
  currentAgentName = null;
  input.value = '';
  resizeTextarea(input);
  document.getElementById('send-btn').disabled = true;
  input.disabled = true;

  showAnalyzingBar('Analyzing Architecture...');

  if (!currentSessionId) {
    currentSessionId = Date.now().toString();
    const title = prompt.slice(0, 42) + (prompt.length > 42 ? '...' : '');
    document.getElementById('chat-title').textContent = title;
    chatSessions.unshift({ id: currentSessionId, title, history: [] });
    renderHistory();
  }

  // HTTP POST for Vercel Serverless Function
  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt,
        history: conversationHistory.slice(-10),
        model: document.getElementById('model-select').value,
        mode: currentMode,
      })
    });

    if (!response.ok) throw new Error('API request failed');
    
    // Read SSE events manually
    const reader = response.body.getReader();
    const decoder = new TextDecoder('utf-8');
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n\n'); // SSE format separates messages by 2 newlines
      buffer = lines.pop() || ''; // Keep the incomplete message in the buffer

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
             handleWSMessage(data); // Reuse the same handler
          } catch (e) {
             console.error("SSE Parse Error", e, line);
          }
        }
      }
    }
  } catch (error) {
    handleError(error.message);
  }
}

// Ensure the handleWSMessage function remains to process the incoming SSE objects
function handleWSMessage(msg) {
  switch (msg.type) {
    case 'phase':      handlePhase(msg.phase); break;
    case 'stream_start': handleStreamStart(msg.agent); break;
    case 'token':      handleToken(msg.token); break;
    case 'stream_end': handleStreamEnd(msg.agent, msg.content, msg.final); break;
    case 'error':      handleError(msg.message); break;
  }
}

// ─── UI Helpers ──────────────────────────────────────────────────────────────
function createAssistantBlock() {
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.innerHTML = `
    <div class="msg-header">
      <div class="msg-avatar ai-av">◈</div>
      <span class="msg-name ai-name">OpenCode</span>
    </div>
  `;
  const body = document.createElement('div');
  body.className = 'msg-body';
  row.appendChild(body);

  appendMessage(row);
  return body;
}

function appendMessage(el) {
  const msgs = document.getElementById('messages');
  msgs.appendChild(el);
  scrollToBottom();
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function showAnalyzingBar(text) {
  const bar = document.getElementById('analyzing-bar');
  document.getElementById('analyzing-text').textContent = text;
  bar.classList.add('visible');
}

function hideAnalyzingBar() {
  document.getElementById('analyzing-bar').classList.remove('visible');
}

function setStatus(state, text) {
  document.getElementById('status-dot').className = `status-dot ${state}`;
  document.getElementById('status-text').textContent = text;
}

// ─── Mode ─────────────────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-fast').classList.toggle('active', mode === 'fast');
  document.getElementById('mode-deep').classList.toggle('active', mode === 'deep');

  // Show/hide pipeline in topbar
  document.getElementById('pipeline').style.opacity = mode === 'deep' ? '1' : '0.3';

// ─── History ─────────────────────────────────────────────────────────────────
function renderHistory() {
  const container = document.getElementById('chat-history');
  container.innerHTML = chatSessions.map(s => `
    <div class="history-item ${s.id === currentSessionId ? 'active' : ''}" onclick="loadSession('${s.id}')">
      <div class="dot"></div>${escapeHtml(s.title)}
    </div>
  `).join('');
}

function loadSession(id) {
  const s = chatSessions.find(x => x.id === id);
  if (!s) return;
  // Basic: just updating active state for now
  currentSessionId = id;
  renderHistory();
}

function updateSessionHistory() {
  const s = chatSessions.find(x => x.id === currentSessionId);
  if (s) s.history = [...conversationHistory];
  renderHistory();
}

// ─── Suggestions ──────────────────────────────────────────────────────────────
function useSuggestion(btn) {
  const text = btn.querySelector('strong').textContent + ': ' + btn.textContent.replace(btn.querySelector('strong').textContent, '').trim();
  document.getElementById('prompt-input').value = text;
  document.getElementById('prompt-input').focus();
  resizeTextarea(document.getElementById('prompt-input'));
}

// ─── Markdown → HTML ──────────────────────────────────────────────────────────
function renderMarkdown(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const escaped = escapeHtml(code.trim());
    const langLabel = lang || 'code';
    return `<pre>
      <button class="copy-btn" onclick="copyCode(this)">Copy</button>
      <span class="code-lang-badge">${langLabel}</span>
      <code>${highlightCode(escaped)}</code>
    </pre>`;
  });

  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // Headings
  text = text.replace(/^### (.+)$/gm, '<h3 style="color:var(--gold);font-size:13px;margin:12px 0 6px;font-weight:600;letter-spacing:.04em">$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2 style="color:var(--cyan);font-size:14px;margin:14px 0 6px;font-weight:600">$1</h2>');

  // Lists
  text = text.replace(/^[-*] (.+)$/gm, '<li style="margin:3px 0;padding-left:4px">$1</li>');
  text = text.replace(/(<li[\s\S]*?<\/li>)/g, '<ul style="padding-left:20px;margin:8px 0">$1</ul>');

  // Line breaks
  text = text.replace(/\n\n/g, '</p><p style="margin:8px 0">');
  text = text.replace(/\n/g, '<br>');

  return `<p style="margin:0">${text}</p>`;
}

function highlightCode(code) {
  // Very basic syntax highlighting
  return code
    .replace(/\b(const|let|var|function|class|interface|type|export|import|return|async|await|if|else|for|while|new|extends|implements|readonly|private|public|protected|abstract|static)\b/g, '<span class="kw">$1</span>')
    .replace(/(["'`])([\s\S]*?)\1/g, '<span class="str">$1$2$1</span>')
    .replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>')
    .replace(/(\/\/[^\n]*)/g, '<span class="cmt">$1</span>');
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function copyCode(btn) {
  const code = btn.parentElement.querySelector('code').textContent;
  await navigator.clipboard.writeText(code);
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 1500);
}

// ─── Textarea auto-resize + Enter key ────────────────────────────────────────
const textarea = document.getElementById('prompt-input');

textarea.addEventListener('input', () => resizeTextarea(textarea));

textarea.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function resizeTextarea(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

// ─── Check API status ─────────────────────────────────────────────────────────
function checkStatus() {
  setStatus('online', 'Vercel Edge & HuggingFace connected');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
checkStatus();
setMode('fast'); // Default to fast mode
